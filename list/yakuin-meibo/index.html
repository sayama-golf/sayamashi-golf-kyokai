<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年 役員名簿</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ★ここが重要（余白原因を除去） */
body{
    font-family: Arial, sans-serif;
    background:#f5f7f5;
    color:#333;
    line-height:1.6;
}

/* ======================
   ヘッダー（完全統一）
====================== */
header{
    position:relative;
    width:100%;
    min-height:320px;
    background:url("header.jpg") center 35% / cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    text-align:center;
    font-size:4rem;
    font-weight:bold;
    overflow:hidden;
}

header::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
}

header span{
    position:relative;
    z-index:2;
    text-shadow:0 4px 12px rgba(0,0,0,0.9);
}

/* ======================
   ナビタブ（完全統一）
====================== */
.nav-tabs{
    display:flex;
    justify-content:center;
    background:#ffffff;
    border-bottom:2px solid #c8e6c9;
}

.nav-tabs a{
    flex:1;
    text-align:center;
    padding:28px 5px;
    text-decoration:none;
    color:#2e7d32;
    font-weight:bold;
    font-size:1.2rem;
    border-right:1px solid #e0e0e0;
}

.nav-tabs a:last-child{
    border-right:none;
}

.nav-tabs a:hover{
    background:#e8f5e9;
}

/* ======================
   メインエリア（余白はここで管理）
====================== */
main{
    max-width:900px;
    margin:40px auto;
    padding:0 20px;
}

/* ======================
   タイトル
====================== */
.title-box{
    background:#c5e1a5;
    border:3px solid #7cb342;
    padding:15px;
    text-align:center;
    font-size:1.8rem;
    font-weight:bold;
    color:#33691e;
    position:relative;
    margin-bottom:20px;
}

.title-box::before,
.title-box::after{
    content:"";
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:28px;
    height:28px;
    background:
        linear-gradient(#558b2f,#558b2f) 0 0/12px 12px,
        linear-gradient(#558b2f,#558b2f) 16px 0/12px 12px,
        linear-gradient(#558b2f,#558b2f) 0 16px/12px 12px,
        linear-gradient(#558b2f,#558b2f) 16px 16px/12px 12px;
    background-repeat:no-repeat;
}

.title-box::before{ left:15px; }
.title-box::after{ right:15px; }

/* ======================
   テーブル
====================== */
.table-wrap{
    max-width:600px;
    margin:0 auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#ffffff;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

th, td{
    border:1px solid #999;
    padding:10px;
    text-align:center;
}

th{
    background:#aed581;
    color:#1b5e20;
    font-weight:bold;
}

td{
    background:#f9f9f9;
}

tr:nth-child(even) td{
    background:#f1f8e9;
}

/* ======================
   スマホ対応
====================== */
@media (max-width:768px){

header{
    min-height:200px;
    font-size:2rem;
}

.nav-tabs a{
    padding:16px 3px;
    font-size:0.9rem;
}

main{
    margin:25px auto;
    padding:0 14px;
}

.title-box{
    font-size:1.3rem;
}

th, td{
    font-size:0.9rem;
    padding:8px;
}

}
</style>
</head>

<body>
