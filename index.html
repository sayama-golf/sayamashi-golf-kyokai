<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狭山市ゴルフ協会</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f5f7f5;
    color:#333;
}

/* ======================
   ヘッダー
====================== */
header{
    position:relative;
    min-height:320px;
    background:url("header.jpg") center 35% / cover no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#fff;
    font-size:4rem;
    font-weight:bold;
    text-align:center;
}

header::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
}

header span{
    position:relative;
    z-index:2;
    text-shadow:0 4px 12px rgba(0,0,0,0.9);
}

/* ======================
   ナビタブ
====================== */
.nav-tabs{
    display:flex;
    justify-content:center;
    background:#ffffff;
    border-bottom:2px solid #c8e6c9;
}

.nav-tabs a{
    flex:1;
    text-align:center;
    padding:28px 5px;
    text-decoration:none;
    color:#2e7d32;
    font-weight:bold;
    font-size:1.2rem;
    border-right:1px solid #e0e0e0;
}

.nav-tabs a:last-child{
    border-right:none;
}

.nav-tabs a:hover{
    background:#e8f5e9;
}

/* ======================
   メイン
====================== */
main{
    max-width:900px;
    margin:30px auto;
    padding:0 20px;
}

/* ======================
   お知らせ
====================== */
.news-box{
    background:#ffffff;
    border:2px solid #c8e6c9;
    border-radius:10px;
    padding:15px;
    height:320px;
    overflow-y:auto;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.news-title{
    font-weight:bold;
    color:#2e7d32;
    margin-bottom:10px;
}

.news-item{
    padding:10px 0;
    border-bottom:1px dashed #ccc;
    font-size:0.95rem;
}

.news-item:last-child{
    border-bottom:none;
}

.news-date{
    font-weight:bold;
    margin-right:10px;
}

/* ======================
   カウンター（最下部中央）
====================== */
.counter-wrap{
    background:#f5f7f5; /* 本文と統一 */
    padding:25px 20px;

    display:flex;
    justify-content:center; /* ← 中央寄せ */
    align-items:center;
}

.counter-box{
    text-align:center;
}

/* ======================
   スマホ
====================== */
@media (max-width:768px){

header{
    min-height:200px;
    font-size:2rem;
    background-position:center center;
}

.nav-tabs a{
    padding:16px 3px;
    font-size:0.9rem;
}

.news-box{
    height:220px;
}

.counter-wrap{
    padding:20px 10px;
}

.counter-box img{
    max-width:100%;
    height:auto;
}

}
</style>
</head>

<body>

<header>
    <span>狭山市ゴルフ協会</span>
</header>

<div class="nav-tabs">
    <a href="https://sayama-golf.github.io/sayamashi-golf-kyokai/">ホーム</a>
    <a href="events-home/events/index.html">大会案内</a>
    <a href="list/yakuin-meibo/index.html">役員名簿</a>
    <a href="list/toiawase/index.html">問合せ</a>
</div>

<main>

<div class="news-box">

    <div class="news-title">
        <i class="fa-solid fa-bullhorn"></i> お知らせ
    </div>

    <div class="news-item">
        <span class="news-date">2026.05.02</span>
        第91回狭山市ゴルフ大会の案内を掲載しました
    </div>

    <div class="news-item">
        <span class="news-date">2026.05.01</span>
        狭山市ゴルフ協会のHPを開設しました
    </div>

</div>

</main>

<!-- カウンター（最下部） -->
<div class="counter-wrap">
    <div class="counter-box">
        <img src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Fsayama-golf.github.io%2Fsayama-golf-taikai%2F&label=%E6%9C%AC%E6%97%A5%E3%81%AE%E6%9D%A5%E8%A8%AA%E8%80%85%E6%95%B0+%2F+%E7%B4%AF%E8%A8%88%E6%9D%A5%E8%A8%AA%E8%80%85%E6%95%B0&icon=info-circle&color=%23198754&style=flat&tz=Asia%2FTokyo" alt="アクセスカウンター">
    </div>
</div>

</body>
</html>
