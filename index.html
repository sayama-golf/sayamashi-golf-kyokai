<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狭山市ゴルフ協会</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f5f7f5;
    color:#333;
}

/* ======================
   ヘッダー
====================== */
header{
    position:relative;
    min-height:260px;
    background:url("header.jpg") center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:2.5rem;
    font-weight:bold;
}

header::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.4);
}

header span{
    position:relative;
    z-index:2;
}

/* ======================
   ナビタブ
====================== */
.nav-tabs{
    display:flex;
    justify-content:center;
    background:#ffffff;
    border-bottom:2px solid #c8e6c9;
}

.nav-tabs a{
    flex:1;
    text-align:center;
    padding:14px 5px;
    text-decoration:none;
    color:#2e7d32;
    font-weight:bold;
    border-right:1px solid #e0e0e0;
    transition:0.2s;
}

.nav-tabs a:last-child{
    border-right:none;
}

.nav-tabs a:hover{
    background:#e8f5e9;
}

/* ======================
   メイン
====================== */
main{
    max-width:900px;
    margin:30px auto;
    padding:0 20px;
}

/* ======================
   お知らせ
====================== */
.news-box{
    background:#ffffff;
    border:2px solid #c8e6c9;
    border-radius:10px;
    padding:15px;
    height:160px;
    overflow-y:auto;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.news-title{
    font-weight:bold;
    color:#2e7d32;
    margin-bottom:10px;
}

/* 各行 */
.news-item{
    padding:10px 0;
    border-bottom:1px dashed #ccc;
    font-size:0.95rem;
}

.news-item:last-child{
    border-bottom:none;
}

/* 日付 */
.news-date{
    font-weight:bold;
    margin-right:10px;
}

/* ======================
   スマホ
====================== */
@media (max-width:768px){

header{
    min-height:180px;
    font-size:1.6rem;
}

.nav-tabs a{
    font-size:0.85rem;
    padding:12px 3px;
}

.news-box{
    height:140px;
}

}
</style>
</head>

<body>

<!-- ヘッダー -->
<header>
    <span>狭山市ゴルフ協会</span>
</header>

<!-- ナビタブ -->
<div class="nav-tabs">
    <a href="https://sayama-golf.github.io/sayamashi-golf-kyokai/">ホーム</a>
    <a href="events-home/index.html">大会案内</a>
    <a href="list/yakuin-meibo/index.html">役員名簿</a>
    <a href="list/toiawase/index.html">問合せ</a>
</div>

<main>

<!-- お知らせ -->
<div class="news-box">

    <div class="news-title">
        <i class="fa-solid fa-bullhorn"></i> お知らせ
    </div>

    <div class="news-item">
        <span class="news-date">2026.05.02</span>
        第91回狭山市ゴルフ大会の案内を掲載しました
    </div>

    <div class="news-item">
        <span class="news-date">2026.05.01</span>
        狭山市ゴルフ協会のHPを開設しました
    </div>

</div>

</main>

</body>
</html>
